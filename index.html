<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindShelf</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}
body{
    background:linear-gradient(135deg,#20352b,#1a2c23,#14211a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:30px;
}
.card{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:50px 40px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.35);
}
.logo{
    width:92px;
    height:92px;
    margin:0 auto 24px;
    border-radius:24px;
    background:#2e4a39;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}
h1{
    font-size:42px;
    margin-bottom:12px;
    font-weight:700;
}
p{
    color:rgba(255,255,255,0.75);
    line-height:1.6;
    font-size:17px;
    margin-bottom:34px;
}
.buttons{
    display:flex;
    flex-direction:column;
    gap:14px;
}
a{
    text-decoration:none;
    padding:16px;
    border-radius:16px;
    font-weight:600;
    font-size:16px;
    transition:0.25s ease;
}
.primary{
    background:white;
    color:#1d2f24;
}
.primary:hover{
    transform:translateY(-2px);
}
.secondary{
    border:1px solid rgba(255,255,255,0.14);
    color:white;
    background:rgba(255,255,255,0.04);
}
.secondary:hover{
    background:rgba(255,255,255,0.08);
}
.footer{
    margin-top:28px;
    font-size:13px;
    color:rgba(255,255,255,0.45);
}
</style>
</head>
<body>

<div class="card">
    <div class="logo">MS</div>
    <h1>MindShelf</h1>
    <p>
        MindShelf helps readers organize books, track progress, save quotes,
        and remember ideas that matter.
    </p>

    <div class="buttons">
        <a class="primary" href="support.html">Support</a>
        <a class="secondary" href="privacy.html">Privacy Policy</a>
    </div>

    <div class="footer">
        © 2026 MindShelf
    </div>
</div>

</body>
</html>
